##################
# 截图设置 (WebP) #
##################
# 存放路径
screenshot-directory="~/Pictures/Screenshots"
# 截图格式
screenshot-format=webp
# WebP 质量 (0-100)，95 既保证了肉眼无损，体积又远小于 PNG
screenshot-webp-quality=95
# WebP 压缩等级 (0-6)，4 是速度与体积的平衡点
screenshot-webp-compression=4
# 包含色彩描述文件 (确保在不同显示器上看起来颜色一致)
screenshot-tag-colorspace=yes
# 使用高位深 (减少色阶断层)
screenshot-high-bit-depth=yes
# 命名模板：文件名_时间点_序号
screenshot-template="%f_%P_%{n:04}"

##################
# 性能与硬件解码 #
##################
# 硬件解码模式：auto-safe 兼顾稳定与低功耗
hwdec=auto-safe
# 开启精确搜索 (Seek)，定位更准
hr-seek=yes
# 退出时记住播放进度
save-position-on-quit=yes

##################
# 画质渲染优化   #
##################
# 启用高画质预设 (包含更好的缩放算法和色彩处理)
profile=gpu-hq
# 开启去色带 (修复视频中的断层，对动漫尤为重要)
deband=yes
# 缩放算法优化
scale=spline36
cscale=spline36

##################
# 字幕与语言设置 #
##################
# 自动加载包含文件名的外挂字幕
sub-auto=fuzzy
# 优先加载的字幕语言 (中文, 英文)
slang=chs,sc,zh,chi,eng
# 优先加载的音轨语言 (日语, 英文, 中文)
alang=jpn,eng,chi
# 字幕强制使用 UTF-8 编码，防止乱码
sub-codepage=utf-8

##################
# 窗口与界面     #
##################
# 启动时自动最大化 (如果不需要可删除此行)
# maximize=yes
# 禁止显示窗口边框 (根据个人偏好开启)
# no-border
# 窗口置顶
# ontop=yes
##################
# 窗口布局设置   #
##################
##################
# 窗口布局设置   #
##################
# 初始位置居中
# geometry=50%x50%

# 智能缩放逻辑：
# 如果是横屏，宽度会占满 50%，高度按比例缩放（高度此时肯定小于 50%）
# 如果是竖屏，高度会占满 50%，宽度按比例缩放（宽度此时肯定小于 50%）
# 设置为较大的百分比（如 100%）作为保底，确保不会在另一维度被过度压缩
autofit-larger=50%x50%

# 强制保持视频原始比例（防止拉伸）
keepaspect-window=yes

# 禁止窗口大于视频原始尺寸（防止拉伸导致的模糊）
upscale-limit=yes