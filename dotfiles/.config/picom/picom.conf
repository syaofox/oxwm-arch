# --- 基础性能优化 ---
# 必须改回 glx（OpenGL），现代显卡下 glx 比 xrender 快得多
backend = "glx";
# 必须开启 use-damage，只渲染改变的部分，大幅降低资源占用
use-damage = true;
# 移除没必要的同步检查
vsync = true;

# --- 极速淡入淡出 ---
fading = false; # 直接禁用淡入淡出动画，瞬间完成
# 增大步长，让动画几乎在瞬间完成（约 2-3 帧）
# fade-in-step = 0.1;
# fade-out-step = 0.1;
# fade-delta = 4;

# --- 阴影瘦身 ---
# 减小半径可以减少渲染开销
shadow = false;
# shadow-radius = 5;
# shadow-offset-x = -5;
# shadow-offset-y = -5;
# shadow-opacity = 0.5;
# shadow-exclude = [
#   "name = 'Notification'",
#   "class_g ?= 'Notify-osd'",
#   "class_g = 'Cairo-clock'",
#   "_GTK_FRAME_EXTENTS"
# ];

# --- 透明度与模糊 ---
blur:
{
  method = "dual_kawase";
  strength = 4;
};

inactive-opacity = 0.90;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = true;

# 保持你的 WezTerm 规则，但确保 fullscreen 时不进行任何合成计算
opacity-rule = [
    "100:class_g = 'org.wezfurlong.wezterm' && fullscreen",
    "95:class_g = 'org.wezfurlong.wezterm' && !fullscreen"
];

# --- 窗口检测与细节 ---
use-ewmh-active-win = true;
mark-wmwin-focused = true;
mark-ovredir-focused = false;
detect-rounded-corners = true;
detect-client-opacity = true;
detect-transient = true;
log-level = "warn";

# --- 窗口类型微调 ---
wintypes:
{
  tooltip = { fade = true; shadow = false; opacity = 0.95; focus = true; };
  dock = { shadow = false; clip-shadow-above = true; }
  dnd = { shadow = false; }
  popup_menu = { opacity = 1.0; fade = false; } # 弹出菜单禁用动画，体感最快
  dropdown_menu = { opacity = 1.0; fade = false; }
};