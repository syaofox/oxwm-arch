<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
  <!-- 默认抗锯齿和微调 -->
  <match target="font">
    <edit name="antialias" mode="assign"><bool>true</bool></edit>
    <edit name="hinting" mode="assign"><bool>true</bool></edit>
    <edit name="hintstyle" mode="assign"><const>hintslight</const></edit>
    <edit name="rgba" mode="assign"><const>rgb</const></edit>
    <edit name="lcdfilter" mode="assign"><const>lcddefault</const></edit>
  </match>
  <!-- 英文优先使用 DejaVu/Liberation（宽度标准，适合英文界面） -->
  <alias>
    <family>sans-serif</family>
    <prefer>
      <family>DejaVu Sans</family>
      <family>Liberation Sans</family>
      <family>Noto Sans</family>
    </prefer>
  </alias>
  <alias>
    <family>serif</family>
    <prefer>
      <family>DejaVu Serif</family>
      <family>Liberation Serif</family>
      <family>Noto Serif</family>
    </prefer>
  </alias>
  <alias>
    <family>monospace</family>
    <prefer>
      <family>DejaVu Sans Mono</family>
      <family>Liberation Mono</family>
      <family>Noto Sans Mono</family>
    </prefer>
  </alias>
  <!-- 中文 fallback：仅当 sans/serif/monospace 中缺乏字符时才用 Noto Sans CJK SC -->
  <alias>
    <family>sans-serif</family>
    <accept>
      <family>Noto Sans CJK SC</family>
    </accept>
  </alias>
  <alias>
    <family>serif</family>
    <accept>
      <family>Noto Serif CJK SC</family>
    </accept>
  </alias>
  <!-- 让 Noto Sans CJK SC 在英文环境下不覆盖英文字体，只作为 fallback -->
  <match target="pattern">
    <test qual="any" name="family"><string>Noto Sans CJK SC</string></test>
    <edit name="family" mode="assign" binding="same">
      <string>Noto Sans CJK SC</string>
    </edit>
  </match>
  <!-- 禁止某些宽度不标准的字体被首选 -->
  <selectfont>
    <rejectfont>
      <pattern>
        <patelt name="family"><string>Noto Sans CJK JP</string></patelt>
      </pattern>
      <pattern>
        <patelt name="family"><string>Noto Sans CJK KR</string></patelt>
      </pattern>
    </rejectfont>
  </selectfont>
  <!-- 设置 CJK 字体全局 embolden 避免细体发虚 -->
  <match target="font">
    <test name="family"><string>Noto Sans CJK SC</string></test>
    <edit name="embolden" mode="assign"><bool>false</bool></edit>
  </match>
</fontconfig>
